<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pernikahan Gusti & Azwa</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- API Icon FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#dcb8a6', // Soft peach/rose color for the button
                        primaryDark: '#c79f8c',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-100 min-h-screen pt-4 pb-16 md:pt-8">

    <!-- Card Container for the Hero Section -->
    <div
        class="relative mx-auto flex min-h-[460px] md:min-h-[520px] w-full max-w-[1024px] flex-col items-center justify-center overflow-hidden rounded-[2.5rem] bg-neutral-900 p-6 shadow-2xl">

        <div class="pointer-events-none absolute inset-0 z-0 text-center">
            <img src="public/herobg.jpg" alt="Background Texture"
                class="h-full w-full object-cover opacity-50 brightness-50">
        </div>

        <div class="relative z-20 flex w-full flex-col items-center text-center">

            <h1 class="mb-2 text-4xl font-bold leading-tight tracking-tight text-white md:text-5xl">
                Pernikahan Gusti & Azwa
            </h1>

            <p class="mb-10 text-[15px] font-medium tracking-wide text-gray-300 md:text-base">
                "And I will love thee still, my dear, till a' the seas gang dry."
            </p>

            <div class="relative mb-8 flex w-full max-w-md justify-center">

                <div
                    class="relative z-10 rounded-2xl border border-white/5 bg-[#161616cc] px-6 py-3 shadow-[0_8px_30px_rgb(0,0,0,0.3)] backdrop-blur-md">
                    <p class="text-sm text-gray-300 md:text-base">
                        Kepada Yth. Bpk/Ibu <span class="ml-1 font-semibold text-white">[Nama Tamu]</span>
                    </p>
                </div>

            </div>

            <button
                class="relative z-20 flex items-center gap-2.5 rounded-2xl bg-primary px-8 py-3.5 font-semibold text-neutral-900 shadow-xl transition-all duration-300 hover:scale-105 hover:bg-primaryDark">
                <i class="fa-solid fa-envelope text-[20px] opacity-80"></i>
                Buka Undangan
            </button>

        </div>
    </div>

    <div class="mx-auto mt-20 w-full max-w-[1024px] px-4">

        <div class="mb-12 flex flex-col items-center justify-center">
            <i class="fa-regular fa-heart mb-2 text-3xl text-primary"></i>
            <h2 class="border-b-4 border-primary pb-1 text-3xl font-bold tracking-tight text-slate-800 md:text-4xl">
                Lovebirds
            </h2>
        </div>

        <div class="flex flex-col items-center justify-around gap-12 md:flex-row md:gap-8">


            <div class="flex flex-col items-center text-center">
                <div
                    class="mb-6 h-48 w-48 overflow-hidden rounded-full border-4 border-white shadow-xl md:h-56 md:w-56">
                    <img src="public/gustiportrait.jpeg" alt="Gusti Panji Widodo" class="h-full w-full object-cover">
                </div>
                <h3 class="mb-1 text-2xl font-bold text-slate-800">Gusti Panji Widodo</h3>
                <p class="text-sm text-primaryDark md:text-base">Putra dari Bpk. Joko & Ibu Titik</p>
            </div>

            <div class="flex flex-col items-center text-center">
                <div
                    class="mb-6 h-48 w-48 overflow-hidden rounded-full border-4 border-white shadow-xl md:h-56 md:w-56">
                    <img src="public/azwaportrait.jpeg" alt="Azwa Zahira" class="h-full w-full object-cover">
                </div>
                <h3 class="mb-1 text-2xl font-bold text-slate-800">Azwa Zahira</h3>
                <p class="text-sm text-primaryDark md:text-base">Putri dari Bpk. Rusnaldi & Ibu Verawati</p>
            </div>

        </div>

    </div>

</body>

</html>
